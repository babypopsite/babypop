<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BabyPop | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #FFFFFF;
            --bg-secundario: #F7F9F9;
            --cor-borda: #EFF3F4;
            --texto: #0F1419;
            --b-blue: #1E5AAF; --a-pink: #E5238B; --b-sky: #2FBBEB; --y-yellow: #FFDB3B;
            --p-purple: #7F3F98; --o-orange: #F16F24; --p-green: #36B44B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-principal); font-family: 'Inter', sans-serif; color: var(--texto); overflow-x: hidden; }

        header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--cor-borda); }

        .header-animado { padding: 15px; display: flex; justify-content: center; align-items: center; height: 110px; overflow: hidden; }
        .svg-logo-container { width: 250px; height: 80px; }
        .text-letter { font-family: 'Fredoka', sans-serif; font-size: 38px; font-weight: 700; animation: wave 3s ease-in-out infinite; }
        .anim-element { opacity: 0; animation: sparkle 4s ease-in-out infinite; }

        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.1); } }

        .nav-tabs { display: flex; width: 100%; border-bottom: 1px solid var(--cor-borda); }
        .tab-item { flex: 1; text-align: center; padding: 15px 0; text-decoration: none; color: #536471; font-weight: 600; font-size: 14px; }

        .feed { max-width: 600px; margin: 0 auto; min-height: 100vh; padding: 15px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section:target { display: block; }
        #personagens { display: block; }
        #personagens:has(~ .section:target) { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* AJUSTE PARA SHORTS (VERTICAL 9:16) */
        .shorts-container { 
            width: 100%; 
            max-width: 315px; /* Tamanho ideal para um Short no feed */
            margin: 0 auto 20px auto; 
            aspect-ratio: 9/16; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .shorts-container iframe { width: 100%; height: 100%; border: none; }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card-pessoal { background: var(--bg-secundario); border-radius: 16px; border: 1px solid var(--cor-borda); overflow: hidden; }
        .card-pessoal img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-nome { padding: 10px; font-weight: 700; font-size: 14px; text-align: center; }
        .placeholder-box { background: var(--bg-secundario); border-radius: 16px; padding: 40px 20px; text-align: center; border: 1px dashed #CFD9DE; color: #536471; }
    </style>
</head>
<body>

<header>
    <div class="header-animado">
        <div class="svg-logo-container">
            <svg viewBox="0 0 250 80">
                <circle class="anim-element" fill="#7F3F98" cx="20" cy="20" r="5" style="animation-delay:0.5s;"/>
                <path class="anim-element" fill="#FFDB3B" d="M220,15 L222,20 L227,20 L223,23 L224,28 L220,25 L216,28 L217,23 L213,20 L218,20 Z" style="animation-delay:1s;"/>
                <g transform="translate(45, 45)">
                    <text class="text-letter" fill="#1E5AAF" x="0" y="0" style="animation-delay:0.1s;">B</text>
                    <text class="text-letter" fill="#E5238B" x="30" y="0" style="animation-delay:0.3s;">a</text>
                    <text class="text-letter" fill="#2FBBEB" x="55" y="0" style="animation-delay:0.5s;">b</text>
                    <text class="text-letter" fill="#FFDB3B" x="80" y="0" style="animation-delay:0.7s;">y</text>
                </g>
                <g transform="translate(90, 75)">
                    <text class="text-letter" fill="#7F3F98" x="0" y="0" style="animation-delay:0.9s;">P</text>
                    <text class="text-letter" fill="#F16F24" x="25" y="0" style="animation-delay:1.1s;">o</text>
                    <text class="text-letter" fill="#36B44B" x="50" y="0" style="animation-delay:1.3s;">p</text>
                </g>
            </svg>
        </div>
    </div>
    <nav class="nav-tabs">
        <a href="#v" class="tab-item">Vídeos</a>
        <a href="#m" class="tab-item">Músicas</a>
        <a href="#j" class="tab-item">Jogos</a>
        <a href="#personagens" class="tab-item">Personagens</a>
    </nav>
</header>

<main class="feed">
    <div id="personagens" class="section">
        <div class="grid-container">
            <div class="card-pessoal"><img src="pj.png"><div class="card-nome">PJ</div></div>
            <div class="card-pessoal"><img src="mia.png"><div class="card-nome">Mia</div></div>
            <div class="card-pessoal"><img src="mio.png"><div class="card-nome">Mio</div></div>
            <div class="card-pessoal"><img src="mae.png"><div class="card-nome">Mãe</div></div>
            <div class="card-pessoal"><img src="pai.png"><div class="card-nome">Pai</div></div>
            <div class="card-pessoal"><img src="jami.png"><div class="card-nome">Jami</div></div>
            <div class="card-pessoal"><img src="gato.png"><div class="card-nome">Gato</div></div>
            <div class="card-pessoal"><img src="pato.png"><div class="card-nome">Pato</div></div>
            <div class="card-pessoal"><img src="coelho.png"><div class="card-nome">Coelho</div></div>
            <div class="card-pessoal"><img src="urso.png"><div class="card-nome">Urso</div></div>
            <div class="card-pessoal"><img src="tartaruga.png"><div class="card-nome">Tartaruga</div></div>
            <div class="card-pessoal"><img src="passarinho.png"><div class="card-nome">Pássaro</div></div>
        </div>
    </div>

    <div id="v" class="section">
        <div class="shorts-container">
            <iframe src="https://www.youtube.com/embed/lFG0yy4IHGI" allowfullscreen></iframe>

        </div>
        <div class="placeholder-box">Desça para ver mais Shorts em breve!</div>
    </div>

    <div id="m" class="section"><div class="placeholder-box">Nossos ritmos para os pequenos. 🎵</div></div>
    <div id="j" class="section"><div class="placeholder-box">Novas atividades vindo aí. 🎮</div></div>
</main>

</body>
</html>
