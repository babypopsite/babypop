<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BabyPop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #FFFFFF;
            --bg-secundario: #F7F9F9;
            --cor-borda: #EFF3F4;
            --texto: #0F1419;
            --destaque: #1D9BF0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-principal); 
            font-family: 'Inter', sans-serif; 
            color: var(--texto);
            line-height: 1.3;
        }

        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--cor-borda);
        }

        .topo-logo {
            padding: 15px;
            text-align: center;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .nav-tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid var(--cor-borda);
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            text-decoration: none;
            color: #536471;
            font-weight: 600;
            font-size: 14px;
            position: relative;
        }

        .feed { max-width: 600px; margin: 0 auto; min-height: 100vh; }
        
        .section { display: none; padding: 15px; }
        .section:target { display: block; }
        #personagens { display: block; }
        #personagens:has(~ .section:target) { display: none; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card-pessoal {
            background: var(--bg-secundario);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--cor-borda);
        }

        .card-pessoal img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .card-nome {
            padding: 10px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }

        .media-box {
            width: 100%;
            background: #000;
            border-radius: 16px;
            aspect-ratio: 16/9;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        .media-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .placeholder-box {
            background: var(--bg-secundario);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            border: 1px dashed #CFD9DE;
            color: #536471;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header>
    <div class="topo-logo">BabyPop</div>
    <nav class="nav-tabs">
        <a href="#v" class="tab-item">Vídeos</a>
        <a href="#m" class="tab-item">Músicas</a>
        <a href="#j" class="tab-item">Jogos</a>
        <a href="#personagens" class="tab-item">Personagens</a>
    </nav>
</header>

<main class="feed">

    <div id="personagens" class="section">
        <div class="grid-container">
            <div class="card-pessoal"><img src="pj.png"><div class="card-nome">PJ</div></div>
            <div class="card-pessoal"><img src="mia.png"><div class="card-nome">Mia</div></div>
            <div class="card-pessoal"><img src="mio.png"><div class="card-nome">Mio</div></div>
            <div class="card-pessoal"><img src="mae.png"><div class="card-nome">Mãe</div></div>
            <div class="card-pessoal"><img src="pai.png"><div class="card-nome">Pai</div></div>
            <div class="card-pessoal"><img src="jami.png"><div class="card-nome">Jami</div></div>
            <div class="card-pessoal"><img src="gato.png"><div class="card-nome">Gato</div></div>
            <div class="card-pessoal"><img src="pato.png"><div class="card-nome">Pato</div></div>
            <div class="card-pessoal"><img src="coelho.png"><div class="card-nome">Coelho</div></div>
            <div class="card-pessoal"><img src="urso.png"><div class="card-nome">Urso</div></div>
            <div class="card-pessoal"><img src="tartaruga.png"><div class="card-nome">Tartaruga</div></div>
            <div class="card-pessoal"><img src="passarinho.png"><div class="card-nome">Pássaro</div></div>
        </div>
    </div>

    <div id="v" class="section">
        <div class="media-box">
            <iframe src="https://www.youtube.com/embed/ID_DO_VIDEO" allowfullscreen></iframe>
        </div>
        <div class="placeholder-box">Mais novidades em breve...</div>
    </div>

    <div id="m" class="section">
        <div class="placeholder-box">Prepare o fone de ouvido! 🎵</div>
    </div>

    <div id="j" class="section">
        <div class="placeholder-box">Em breve, diversão interativa aqui. 🎮</div>
    </div>

</main>

</body>
</html>
